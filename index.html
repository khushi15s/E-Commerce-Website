<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>E-Commerce</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar -->
<header>
    <h2 class="logo">ShopEase</h2>
    <nav>
        <a href="#">Home</a>
        <a href="#">Products</a>
        <a href="#">Cart</a>
        <a href="#">Support</a>
    </nav>
    <input type="text" id="search" placeholder="Search products..." onkeyup="searchProduct()">
</header>

<!-- Hero Section -->
<section class="hero">
    <div class="hero-text">
        <h1>Online Shopping</h1>
        <p>Find the best products at amazing prices</p>
    </div>
</section>

<!-- Products -->
<section class="products" id="product-list"></section>

<!-- Cart -->
<section class="cart">
    <h2>Shopping Cart</h2>
    <ul id="cart-items"></ul>
    <h3>Total: ₹<span id="total">0</span></h3>
    <button onclick="checkout()">Checkout</button>
</section>

<!-- Support -->
<section class="support">
    <h2>Customer Support</h2>
    <p>Email: support@shopease.com</p>
    <p>Phone: +91 9876543210</p>
</section>

<script src="script.js"></script>
</body>
</html>
